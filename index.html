<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Instagram Profiles</title>

    <link rel="icon" type="image/x-icon"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/1280px-Instagram_icon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="profiles-wrapper">

        <!-- 29ABV -->

        <section class="phone">

            <div class="screen">

                <header class="profile-header">

                    <div class="top-bar">

                        <h2>29abv</h2>

                        <button>···</button>

                    </div>

                    <div class="profile-main">

                        <div class="profile-image">
                            <img src="pfpwhite.jpg" alt="29abv">
                        </div>

                        <div class="stats">

                            <div>
                                <strong>5</strong>
                                <span>posts</span>
                            </div>

                            <div>
                                <strong>5296</strong>
                                <span>seguidores</span>
                            </div>

                            <div>
                                <strong>119</strong>
                                <span>seguindo</span>
                            </div>

                        </div>

                    </div>

                    <div class="bio">

                        <p class="name">lica</p>

                        <p>۶ৎ <span>@laufey</span></p>

                        <p>𝗁𝗈𝗏𝖾𝗋 𝗅𝗂𝗄𝖾 𝖺 ★</p>

                    </div>

                    <div class="buttons">

                        <button class="follow-btn">
                            Seguindo
                        </button>

                        <button class="message-btn">
                            Mensagem
                        </button>

                    </div>

                </header>

            </div>

        </section>

        <!-- BENIGNOLICA -->

        <section class="phone">

            <div class="screen">

                <header class="profile-header">

                    <div class="top-bar">

                        <h2>benignolica</h2>

                        <button>···</button>

                    </div>

                    <div class="profile-main">

                        <div class="profile-image">
                            <img src="pfp.jpg" alt="benignolica">
                        </div>

                        <div class="stats">

                            <div>
                                <strong>16</strong>
                                <span>posts</span>
                            </div>

                            <div>
                                <strong>75</strong>
                                <span>seguidores</span>
                            </div>

                            <div>
                                <strong>79</strong>
                                <span>seguindo</span>
                            </div>

                        </div>

                    </div>

                    <div class="bio">

                        <p class="name">angelica</p>

                        <p>🇻🇦ㅣtoda d'Ele.</p>

                        <p>𖹭 <span>@corinthians</span></p>

                    </div>

                    <div class="buttons">

                        <button class="follow-btn">
                            Seguindo

                        <button class="message-btn">
                            Mensagem
                        </button>

                    </div>

                </header>

            </div>

        </section>

    </main>

</body>

</html>
